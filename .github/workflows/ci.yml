name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy

      - name: Unit tests
        run: pytest tests/unit

      - name: Docs build
        run: mkdocs build --strict

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Start stack
        run: docker compose up -d --build --wait --wait-timeout 300
        env:
          EVENTS_PER_SECOND: "100"
          ERROR_RATE: "0.05"

      - name: Integration tests
        run: pytest tests/integration -m integration -q

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 100

      - name: Teardown
        if: always()
        run: docker compose down -v
