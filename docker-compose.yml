name: telestream

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: telestream-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: telestream-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  postgres:
    image: postgres:16
    container_name: telestream-postgres
    environment:
      POSTGRES_USER: telestream
      POSTGRES_PASSWORD: telestream
      POSTGRES_DB: telestream
    ports:
      - "5432:5432"
    volumes:
      - ./warehouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./warehouse/seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telestream -d telestream"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 512m

  spark:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: telestream-spark
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_DSN: postgresql://telestream:telestream@postgres:5432/telestream
      LAKE_PATH: /data/lake
      CHECKPOINT_PATH: /data/checkpoints
    volumes:
      - lake:/data/lake
      - checkpoints:/data/checkpoints
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

  producer:
    build:
      context: .
      dockerfile: docker/producer/Dockerfile
    container_name: telestream-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTS_PER_SECOND: ${EVENTS_PER_SECOND:-50}
      ERROR_RATE: ${ERROR_RATE:-0.02}
      INITIAL_SUBSCRIBERS: ${INITIAL_SUBSCRIBERS:-500}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    image: grafana/grafana:11.4.0
    container_name: telestream-grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./dashboards/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 256m

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: telestream-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    deploy:
      resources:
        limits:
          memory: 256m

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: telestream-kafka-exporter
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: telestream-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://telestream:telestream@postgres:5432/telestream?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
  lake:
  checkpoints:
