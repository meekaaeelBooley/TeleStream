apiVersion: 1

datasources:
  - name: TeleStream Warehouse
    uid: telestream-pg
    type: postgres
    access: proxy
    url: postgres:5432
    user: telestream
    jsonData:
      database: telestream
      sslmode: disable
      postgresVersion: 1600
    secureJsonData:
      password: telestream
    isDefault: true
    editable: false

  - name: Prometheus
    uid: telestream-prom
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: false
